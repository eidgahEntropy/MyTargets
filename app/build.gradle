    implementation libs.okhttp.urlconnection

    implementation libs.retrofit
    implementation libs.retrofit.converter.gson

    implementation libs.picasso

    implementation libs.android.state
    kapt libs.android.state.processor
    implementation libs.mpandroidchart

    implementation project(':discreteseekbar')

    implementation libs.easyimage

    implementation libs.material.dialogs

    implementation libs.android.about.page

    implementation libs.homage.core
    implementation libs.homage.recyclerview

    implementation libs.rounded.image.view

    implementation libs.material.intro.screen

    implementation libs.photo.view

    implementation libs.android.languages


    implementation project(':signaturepad')

    implementation libs.arch.lifecycle.extensions
    implementation libs.lifecycle.livedata.ktx
    implementation libs.lifecycle.runtime.ktx
    implementation libs.coroutines.android
    kapt libs.arch.lifecycle.compiler
    implementation libs.arch.room.runtime
    kapt libs.arch.room.compiler
    implementation libs.arch.navigation.fragment
    implementation libs.arch.navigation.ui

    implementation project(':shared')

    testImplementation libs.junit4
    testImplementation libs.kotlin.test
    testImplementation libs.kotlin.test.junit

    androidTestImplementation libs.truth
    androidTestImplementation libs.androidx.test.core
    androidTestImplementation libs.androidx.test.junit
    androidTestImplementation libs.androidx.test.runner
    androidTestImplementation libs.androidx.test.rules
    androidTestUtil libs.androidx.test.orchestrator
    androidTestImplementation libs.androidx.test.uiautomator
    androidTestImplementation libs.espresso.core
    androidTestImplementation libs.espresso.contrib
    androidTestImplementation libs.espresso.intents

    implementation libs.espresso.idling.resource
    androidTestScreengrabImplementation libs.screengrab
    androidTestImplementation libs.arch.room.testing

    implementation libs.multidex

}

configurations.configureEach {
    exclude module: 'httpclient'
    exclude module: 'commons-logging'
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'com.google.guava' && details.requested.name == 'guava') {
            details.useVersion '27.0.1-android'
        } else if (details.requested.group == 'org.checkerframework' && details.requested.name == 'checker-compat-qual') {
            details.useVersion '2.5.5'
        } else if (details.requested.group == 'com.google.errorprone' && details.requested.name == 'error_prone_annotations') {
            details.useVersion '2.3.1'
        }
    }
}


